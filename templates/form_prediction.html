{% extends "base.html" %}

{% block title %}Prediksi AI - Attrition{% endblock %}

{% block content %}
    <div class="card" style="max-width: 850px; margin: 0 auto;">
        <h1 style="text-align: center; margin-bottom: 32px;">Prediksi Karyawan Resign (Attrition)</h1>
        
        <form method="POST" action="/predict">
            <div class="form-grid">
                
                <div class="form-group" style="grid-column: span 2; border-bottom: 2px solid #e8f5e9; padding-bottom: 5px; margin-bottom: 10px;">
                    <h3 style="color: #006400; margin: 0;">1. Profil Karyawan</h3>
                </div>

                <div class="form-group">
                    <label>Umur (Age):</label>
                    <input type="number" name="Age" required class="form-control" placeholder="Contoh: 28">
                </div>

                <div class="form-group">
                    <label>Jenis Kelamin (Gender):</label>
                    <select name="Gender" class="form-control">
                        <option value="1">Male (Laki-laki)</option>
                        <option value="0">Female (Perempuan)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Status Pernikahan (Marital Status):</label>
                    <select name="MaritalStatus" class="form-control">
                        <option value="2">Single (Belum Menikah)</option>
                        <option value="1">Married (Menikah)</option>
                        <option value="0">Divorced (Cerai)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Departemen (Department):</label>
                    <select name="Department" class="form-control">
                        <option value="1">Research & Development</option>
                        <option value="2">Sales</option>
                        <option value="0">Human Resources</option>
                    </select>
                </div>

                <div class="form-group" style="grid-column: span 2; border-bottom: 2px solid #e8f5e9; padding-bottom: 5px; margin-bottom: 10px; margin-top: 10px;">
                    <h3 style="color: #006400; margin: 0;">2. Kondisi Pekerjaan & Karir</h3>
                </div>

                <div class="form-group">
                    <label>Sering Lembur? (OverTime):</label>
                    <select name="OverTime" class="form-control">
                        <option value="1">Yes (Sering Lembur)</option>
                        <option value="0">No (Tidak Pernah/Jarang)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Frekuensi Dinas (Business Travel):</label>
                    <select name="BusinessTravel" class="form-control">
                        <option value="2">Travel Rarely (Jarang)</option>
                        <option value="1">Travel Frequently (Sering)</option>
                        <option value="0">Non-Travel (Tidak Pernah)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Jarak Rumah ke Kantor (Km):</label>
                    <input type="number" name="DistanceFromHome" required class="form-control" placeholder="Contoh: 15">
                </div>

                <div class="form-group">
                    <label>Gaji Bulanan (Monthly Income USD):</label>
                    <input type="number" name="MonthlyIncome" required class="form-control" placeholder="Contoh: 3000">
                </div>

                <div class="form-group">
                    <label>Total Pengalaman Kerja (Tahun):</label>
                    <input type="number" name="TotalWorkingYears" required class="form-control" placeholder="Contoh: 8">
                </div>

                <div class="form-group">
                    <label>Lama Bekerja di Sini (Tahun):</label>
                    <input type="number" name="YearsAtCompany" required class="form-control" placeholder="Contoh: 3">
                </div>

            </div>

            <button type="submit" class="btn-predict" style="margin-top: 25px; padding: 15px; font-size: 18px;">
                🚀 Prediksi Sekarang
            </button>
        </form>

        {% if prediction %}
            <div class="result-box" style="text-align: center; margin-top: 35px; border: 2px dashed #006400;">
                <h3 style="margin-top: 0;">Hasil Prediksi:</h3>
                <h1 style="font-size: 32px; margin: 10px 0;">{{ prediction }}</h1>
            </div>
        {% endif %}
    </div>
{% endblock %}
